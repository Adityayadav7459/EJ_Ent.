name: Deploy DataVault to Azure

# Trigger this pipeline only when code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          # The script the robot will run once inside your server
          script: |
            cd ~/EJ_Ent
            git pull origin main
            
            # Rebuild and restart the cloud architecture
            docker compose build --no-cache
            docker compose up -d
            
            # Prune old, unused images to save Azure disk space
            docker image prune -f