server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DEV-OPS UPGRADE: Disable the default 1MB upload limit so large videos can pass through
    client_max_body_size 0;

    # THE PROXY: Catch MinIO traffic on Port 80 and route it to the internal Docker container
    location /ej-ent-videos/ {
        proxy_pass http://minio:9000;

        # 1. Trick MinIO into matching the exact signature Host
        proxy_set_header Host 40.80.89.198:9000;

        # 2. THE FIX: Force HTTP/1.1. This prevents Nginx from altering the video packet and breaking the cryptographic signature!
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 3. Optimize for large videos: Stream directly to MinIO without caching to the Nginx hard drive
        proxy_request_buffering off;
        chunked_transfer_encoding off;
    }

    # The Magic SPA Rule: Fallback to React for UI routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}