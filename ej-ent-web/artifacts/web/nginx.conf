server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DEV-OPS UPGRADE: Disable the default 1MB upload limit so large videos can pass through
    client_max_body_size 0;

    # THE PROXY: Transparent pass-through for S3 signatures
    location /ej-ent-videos/ {
        # The internal MinIO address
        proxy_pass http://minio:9000;

        # 1. CRITICAL: This MUST match the domain the backend used to generate the signature
        # Since backend signed for 40.80.89.198, we MUST pass this exact header.
        proxy_set_header Host 40.80.89.198;

        # 2. Protocol and Buffering (Kept from before)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        chunked_transfer_encoding off;
        
        # 3. Headers to ensure MinIO knows the real IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # The Magic SPA Rule: Fallback to React for UI routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}