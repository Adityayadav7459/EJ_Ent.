server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DEV-OPS UPGRADE: Disable the default 1MB upload limit so large videos can pass through
    client_max_body_size 0;

    # THE PROXY: Catch MinIO traffic on Port 80 and route it to the internal Docker container
    location /ej-ent-videos/ {
        # 'minio' should match the service name in your docker-compose.yml
        proxy_pass http://minio:9000/ej-ent-videos/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The Magic SPA Rule: Fallback to React for UI routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}